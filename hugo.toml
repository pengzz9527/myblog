baseURL = "https://myblog.example.com/"
languageCode = "zh-cn"
title = "我的技术博客"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "分享技术教程、开源项目和AI工具"
  author = "博主昵称"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  
  # Social links
  [params.social]
    GitHub = "username"
    Twitter = ""
    LinkedIn = ""

# 搜索功能
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 菜单配置
[[menu.main]]
  identifier = "posts"
  name = "文章"
  pageRef = "posts"
  weight = 10

[[menu.main]]
  identifier = "categories"
  name = "分类"
  pageRef = "categories"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  pageRef = "tags"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "关于"
  pageRef = "about"
  weight = 40
